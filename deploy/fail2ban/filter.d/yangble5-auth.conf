# fail2ban filter: repeated failed authentication against the yangble5 gateway.
# ===========================================================================
# Reads Caddy's JSON access log (deploy/Caddyfile writes it to
# /var/log/caddy/access.log inside the container, bind-mounted to
# ${YANGBLE5_LOG_DIR}/caddy/access.log on the host).
#
# WHICH IP THIS MATCHES, AND WHY
#
# It matches `remote_ip` — the address that actually opened the TCP connection
# — and NOT `client_ip` (the Cf-Connecting-Ip value Caddy resolves for logging
# and rate limiting).
#
# That is deliberate. fail2ban bans with packet filter rules, and a packet
# filter can only drop the peer it sees. When traffic arrives through
# Cloudflare, the peer is a Cloudflare edge node: banning it would ban every
# other user sharing that node and would not touch the attacker. So:
#
#   * Cloudflare's ranges belong in `ignoreip` (harden.sh puts them there).
#   * With the orange cloud ON, this jail protects you against attackers who
#     found your origin IP and are hitting it directly — which is exactly the
#     attack a packet filter can stop.
#   * Abuse arriving THROUGH Cloudflare must be stopped at Cloudflare
#     (rate limiting rules — see cloudflare.md) and by the gateway's own
#     AUTH_FAIL_LOCKOUT_THRESHOLD, which counts per key, not per packet.
#
# VERIFY BEFORE TRUSTING IT. Log field order is not a stable API:
#     fail2ban-regex /opt/yangble5/logs/caddy/access.log \
#                    /etc/fail2ban/filter.d/yangble5-auth.conf --print-all-matched
# If it reports "0 matched", fix the regex rather than assuming the jail works.
# ===========================================================================

[Definition]

# Deliberately loose between anchors (`.*` rather than an exact field
# sequence) so that a Caddy upgrade adding a new JSON field does not silently
# turn this filter into a no-op.
# `\s*` after every colon: Caddy's encoder emits compact JSON today, but a
# filter that silently stops matching if that ever changes is worse than
# useless — it looks installed and bans nobody.
failregex = ^.*"logger":\s*"http\.log\.access[^"]*".*"remote_ip":\s*"<HOST>".*"uri":\s*"(?:/auth|/register|/login|/v1/auth)[^"]*".*"status":\s*(?:401|403|429)

ignoreregex =

# Caddy's JSON encoder writes `ts` as a float epoch by default.
# If you set `format json { time_format "iso8601" }` in the Caddyfile, replace
# this with the matching ISO pattern — and re-run fail2ban-regex.
datepattern = "ts":{EPOCH}

[Init]
# Access log lines are long; the default 1024-byte scan window can cut off
# before "status".
maxlines = 1

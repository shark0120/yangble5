# yangble5 — Content-Type for a webroot of plain text, as ONE includable unit
# =============================================================================
# WHY THIS FILE EXISTS AS A SEPARATE FILE
#
#   nginx's mime.types has no entry for `.sh`, `.ps1`, `.sha256` or `.md`, so
#   all four fall through to `default_type`, which panel-generated configs set
#   to `application/octet-stream` at http level. A browser handed
#   `application/octet-stream` downloads the file instead of showing it — and
#   with the `X-Content-Type-Options: nosniff` this deployment correctly sends,
#   it cannot be talked out of that. nosniff is right and stays; the fix is to
#   declare the type honestly rather than to let the browser guess.
#
#   That single header breaks the one thing this site asks a visitor to do.
#   The landing page says: read `install.sh` before you run it. You cannot read
#   a download. `/AGENTS.md` is worse — the published one-liner sends an AI
#   agent there as step one, so a human who wants to see what their agent was
#   just told to do gets a file on their disk instead of a page.
#
#   PART 3d of `yangble5.com.conf.example` has carried this fix since the site
#   went up. On 2026-07-23 the live origin still answered `/install.sh` with
#   `Content-Type: application/octet-stream`, because PART 3d is a block you
#   have to remember to paste into an existing `server { }` — and, exactly like
#   PART 2j (the security headers) before it, it was not pasted. Nothing
#   errored; `nginx -t` was happy.
#
#   So this file is the same answer that worked for the headers. A block you
#   have to remember to paste is a block that eventually is not pasted. A file
#   you `include` is atomic: either the include is there and everything below
#   applies, or the path is wrong and `nginx -t` FAILS LOUDLY. There is no
#   half-applied state.
#
# HOW TO APPLY
#
#   1. Copy this file onto the server, next to `security-headers.conf`:
#
#        /etc/nginx/yangble5/static-content-type.conf
#
#      (aaPanel/BT: put it in the per-site extension directory that the vhost
#       already includes with a wildcard — see AAPANEL.md §3 — so a panel
#       rewrite of the vhost cannot drop it.)
#
#   2. Add ONE line inside your `server { }` block, at server level, next to
#      the security-headers include:
#
#        include /etc/nginx/yangble5/static-content-type.conf;
#
#   3. `sudo nginx -t && sudo nginx -s reload`
#
#   4. Verify FROM OFF-HOST — a check run on the VPS bypasses Cloudflare and
#      proves nothing about what the internet receives:
#
#        curl -sSI https://yangble5.com/install.sh | grep -i '^content-type:'
#        curl -sSI https://yangble5.com/AGENTS.md  | grep -i '^content-type:'
#
#      Both must say `text/plain`. `application/octet-stream` means the
#      include is not in the running config — do not conclude "the CDN handles
#      it", because it does not.
#
# ⚠ THE ASSUMPTION THIS FILE MAKES, AND THE TEST THAT KEEPS IT TRUE
#
#   `default_type text/plain` is safe here only because this webroot holds
#   nothing but text: `.html`, `.md`, `.txt`, `.xml`, `.sh`, `.ps1`, `.sha256`.
#   Drop a `.png` or a `.woff2` in and it would be served as text/plain and
#   render as garbage. That is a real trap, so it is not left to a comment:
#   `tests/test_deploy_static_content_type.py` asserts every file under `site/`
#   is text, and a binary added there turns the suite red with this note
#   attached rather than shipping a broken asset.
#
# ⚠ NO add_header BELOW, DELIBERATELY
#
#   nginx does not merge `add_header` across levels. A `location` that declares
#   one of its own drops EVERY header inherited from the server block — which
#   here would silently discard the entire Content-Security-Policy for the
#   whole static site. If you ever need a header inside this location, you must
#   re-include `security-headers.conf` inside it too. See the same warning in
#   that file.
# =============================================================================

# Appends `; charset=utf-8` to the text types nginx already knows (text/plain,
# text/html, text/xml). Without it `/llms.txt` and `/AGENTS.md` — both of which
# contain em dashes and Chinese — are served with no declared encoding and a
# browser falls back to its locale default, which mojibakes them on any machine
# that is not already UTF-8. This only sets the header; with no `source_charset`
# nginx does not recode the body.
charset utf-8;

location / {
    index index.html;
    try_files $uri $uri/ =404;

    # The whole point of the file. See the header comment for why this is safe
    # here and for the test that keeps it safe.
    default_type text/plain;

    # Cache-Control comes from `$yb5_cc` in security-headers.conf and is
    # deliberately short (300s): install.sh and its .sha256 must never be
    # served as a stale pair from a CDN edge.
}

# yangble5 — security response headers, as ONE includable unit
# =============================================================================
# WHY THIS FILE EXISTS AS A SEPARATE FILE
#
#   These directives used to live only inside PART 2j of
#   deploy/nginx/yangble5.com.conf.example — a 670-line snippet whose
#   instructions are "copy the marked blocks into your existing server{}".
#   On yangble5.com's own deployment that paste was incomplete: the live site
#   served no Content-Security-Policy, no X-Content-Type-Options, no
#   X-Frame-Options and no Referrer-Policy. Nothing errored. `nginx -t` was
#   happy. The post-deploy smoke test was green, because the only header it
#   checked was HSTS and Cloudflare supplies an HSTS of its own.
#
#   A block you have to remember to paste is a block that eventually is not
#   pasted. A file you `include` is atomic: either the include is there and
#   every header below is applied, or the include path is wrong and
#   `nginx -t` FAILS LOUDLY. There is no half-applied state.
#
# CLOUDFLARE DOES NOT ADD THESE FOR YOU
#
#   yangble5.com is proxied through Cloudflare, and Cloudflare's default
#   behaviour is to pass origin response headers through — not to invent
#   security headers. The one header the live site did serve,
#   `strict-transport-security: max-age=31536000`, came from Cloudflare's own
#   HSTS setting and is NOT the value this file sets (no `includeSubDomains`).
#   That is exactly how the gap stayed invisible: a header-presence check that
#   only looks for HSTS passes on a site whose origin sets nothing at all.
#
#   Practical consequence: every header here must be set AT THE ORIGIN. If you
#   also configure some of them in Cloudflare (Transform Rules -> Modify
#   Response Header), you now have two sources of truth for the same header
#   and no reason to trust either. Prefer the origin; it is in version control.
#
# HOW TO USE IT
#
#   1. Copy this file to the host, somewhere your nginx user can read:
#
#        sudo install -m 0644 -o root -g root \
#          deploy/nginx/security-headers.conf \
#          /etc/nginx/yangble5/security-headers.conf
#
#      (aaPanel/BT: /www/server/panel/vhost/nginx/yangble5-security-headers.conf
#       is the location that survives a panel rewrite — see AAPANEL.md §3.)
#
#   2. Add ONE line inside your `server { ... }` block, at server level —
#      NOT inside a location:
#
#        include /etc/nginx/yangble5/security-headers.conf;
#
#   3. `sudo nginx -t && sudo nginx -s reload`
#
#   4. Verify FROM OFF-HOST — from your laptop, not from the VPS, because a
#      check run on the VPS bypasses Cloudflare and proves nothing about what
#      the internet receives:
#
#        bash deploy/smoke_test.sh --base-url https://your.domain --no-spend
#
#      or the one-liner, which must print eight header lines and not zero:
#
#        curl -sSI https://your.domain/ | grep -iE \
#          'content-security-policy|x-content-type-options|x-frame-options|referrer-policy|strict-transport|cross-origin-|permissions-policy'
#
# ⚠ THE GOTCHA THAT DELETES ALL OF THIS
#
#   nginx's add_header does NOT merge across levels. A `location` block that
#   contains a single add_header of its own silently drops EVERY add_header
#   inherited from the server level — including all of these. So:
#
#     * declare add_header ONCE, here;
#     * let the API locations in the main snippet declare NONE;
#     * where a value must differ per location, use a variable set with `set`,
#       which DOES override cleanly per location. `$yb5_cc` below is the only
#       one that needs it.
#
#   If you must add a header inside a location, you have to re-include this
#   file inside that location too. Re-including is safe; forgetting is not.
#
# ⚠ KEEP IN SYNC WITH THE SNIPPET
#
#   PART 2j of yangble5.com.conf.example carries the same directives inline so
#   that a naive whole-file paste still ends up secure.
#   tests/test_deploy_security_headers.py asserts the two lists are identical,
#   so editing one and not the other turns the test suite red rather than
#   shipping two configs that disagree.
# =============================================================================

# Cache policy. This is the DEFAULT (the static site in the webroot).
# Every API location overrides it with `set $yb5_cc "no-store, no-transform";`
# — `set` overrides cleanly per location, `add_header` would not.
#
# `no-transform` on the API paths is the standards-based way to tell
# Cloudflare — an intermediary you do not control — not to re-encode or buffer
# the body. Without it a proxied zone may transform a text/event-stream
# response and the agent sits there looking frozen.
#
# The 300s default is deliberately short: install.sh and its .sha256 must never
# be served as a stale pair from a CDN edge.
set $yb5_cc "public, max-age=300";

# `always` on every one of them: a 404, a 429 or a 502 needs nosniff and HSTS
# exactly as much as a 200 does, and without `always` nginx omits add_header on
# non-2xx/3xx responses.
add_header Cache-Control $yb5_cc always;

# Advisory for any FURTHER proxy in front of this one. nginx hides the
# gateway's own X-Accel-Buffering by default (it is in the built-in
# proxy_hide_header list, because nginx consumes it), so this re-adds the
# signal for an outer hop. Cloudflare does not act on it; `proxy_buffering off`
# in PART 2c is what actually does the work.
add_header X-Accel-Buffering "no" always;

# 1 year. `preload` deliberately NOT set: submitting to the preload list is
# effectively irreversible for the domain AND every subdomain, and this box
# serves other sites.
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

# install.sh and uninstall.sh are served from this webroot with no extension
# nginx recognises, so their Content-Type is whatever `default_type` says.
# Without nosniff a browser is free to sniff a script payload into something
# it will execute. This is not decorative on a site whose whole purpose is
# handing people a shell script.
add_header X-Content-Type-Options "nosniff" always;

add_header Referrer-Policy "no-referrer" always;
add_header X-Frame-Options "DENY" always;
add_header Cross-Origin-Opener-Policy "same-origin" always;
add_header Cross-Origin-Resource-Policy "same-origin" always;
add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=()" always;

# Scoped to the static pages in site/. They use inline <style> (allowed) and
# exactly ONE inline <script> each, pinned below by sha256. The two hashes are
# site/index.html's and site/verify.html's script blocks, IN THAT ORDER; they
# change whenever either <script> is edited, and site/README.md carries the
# recompute snippet. tests/test_deploy_security_headers.py recomputes them from
# the real pages, so a stale hash is a red test rather than a page whose copy
# buttons, OS detection and live pool status silently stop working.
#
# Do not "fix" a CSP violation by adding 'unsafe-inline' to script-src on a
# page whose entire job is convincing a visitor it is safe to paste a command
# into a shell. Pin the new hash instead.
add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self' 'sha256-azlzgFYelw1E8Ku3E8GqYH1fE6nmHMTP3Cy/CCWrGT8=' 'sha256-4FFG4w4T/7cQdRclDwWnwwb3pZxhyUhWrDX0fSl2niI=' ; connect-src 'self'; frame-ancestors 'none'; base-uri 'none'; form-action 'self'" always;
